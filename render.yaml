services:
  - type: web
    name: listwise-app
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npx --yes trigger.dev@4.4.6 deploy
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.12.0
      - key: NEXT_PUBLIC_APP_URL
        value: https://listwise-app.onrender.com
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: TRIGGER_SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
